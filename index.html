<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrepKavach — SSC CGL Study Companion</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="window.renderMathInElementReady = true"></script>
</head>
<body>
<header class="topbar">
  <button id="menuToggle" aria-label="Toggle menu">&#9776;</button>
  <h1>🛡️ PrepKavach</h1>
  <button id="themeToggle" aria-label="Toggle theme">&#9790;</button>
</header>

<div class="layout">
  <aside id="sidebar" class="sidebar">
    <nav id="nav"></nav>
  </aside>

  <main id="content" class="content">
    <section class="welcome">
      <h2>Welcome</h2>
      <p>Pick a subject from the left sidebar, then choose a topic to start reading.</p>
      <p>Your progress (read topics) is saved automatically in this browser.</p>
    </section>
  </main>
</div>

<script src="data/content.js"></script>
<script src="data/ancient-history.js"></script>
<script src="data/medieval-history.js"></script>
<script src="data/history-modern.js"></script>
<script src="data/world-history.js"></script>
<script src="data/polity.js"></script>
<script src="data/geography.js"></script>
<script src="data/economy.js"></script>
<script src="data/maths.js"></script>
<script src="js/app.js"></script>
</body>
</html>
